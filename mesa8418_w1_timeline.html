<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Whitney Houston, 1963-2012</title>
    <meta name="description" content="Houston’s voice caught the imagination of the world propelling her to superstardom at an early age becoming one of the most awarded performers of our time.">
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1,width=device-width">
    <link rel="stylesheet" href="//cdn.knightlab.com/libs/timeline3/latest/css/timeline.css">
    <link rel="stylesheet" href="//cdn.knightlab.com/libs/timeline3/latest/css/timeline.css">
    <style>
      html, body {
      height:100%;
      padding: 0px;
      margin: 0px;
      }
    </style>
	  <link rel="shortcut icon" href="https://cdn.knightlab.com/libs/blueline/latest/assets/logos/favicon.ico"> 
  </head>
  
  <body>
    
    <div id="timeline-embed">
      <div id="timeline"></div>
    </div>
    

    <script type="text/javascript" src="//cdn.knightlab.com/libs/timeline3/latest/js/timeline-min.js"></script>
    <script>
      $(document).ready(function() {
          var embed = document.getElementById('timeline-embed');
          embed.style.height = getComputedStyle(document.body).height;
          window.timeline = new TL.Timeline('timeline-embed', 'timeline_w1.json', {
              hash_bookmark: false
          });
          window.addEventListener('resize', function() {
              var embed = document.getElementById('timeline-embed');
              embed.style.height = getComputedStyle(document.body).height;
              timeline.updateDisplay();
          })
      });
    </script>
    
  </body>
</html>
